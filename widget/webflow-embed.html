<div id="alfie-widget-container"></div>

<script>
// Простой embed код для Webflow
(function() {
    // Создаем iframe с нашим виджетом
    const container = document.getElementById('alfie-widget-container');
    if (container) {
        container.innerHTML = `
            <iframe 
                src="http://localhost:3000" 
                width="100%" 
                height="600" 
                frameborder="0" 
                scrolling="no"
                style="border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
            </iframe>
        `;
    }
})();
</script>
