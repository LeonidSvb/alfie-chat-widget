<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfie Chat Widget</title>
    <link rel="stylesheet" href="./widget/styles.css">
</head>
<body>
    <div id="alfie-widget"
         data-flow-inspire="./widget/configs/flow1-inspire.json"
         data-flow-planning="./widget/configs/flow2-planning.json" 
         data-webhook-alfie="https://leonidshvorob.app.n8n.cloud/webhook/alfie-summary"
         data-webhook-final="https://leonidshvorob.app.n8n.cloud/webhook-test/final-processing"
         data-images-path="./widget/images/">
        
        <div class="alfie-embedded-chat">
            <!-- Progress Bar -->
            <div class="alfie-progress-container" id="progress-container" style="display: none;">
                <div class="alfie-progress-text" id="progress-text">
                    <span class="alfie-progress-emoji">🗣️</span>
                    <span>Getting started...</span>
                </div>
                <div class="alfie-progress-track">
                    <div class="alfie-progress-bar" id="progress-bar"></div>
                </div>
            </div>
            
            <!-- Alfie Introduction -->
            <div class="alfie-intro">
                <div class="alfie-avatar-main">
                    <img src="./widget/images/3.png" alt="Alfie" />
                </div>
                <div class="alfie-greeting">
                    <div class="alfie-greeting-bubble">
                        Hi, I'm Alfie 👋 Tell me what you're dreaming up and I'll share free tailored trip ideas to inspire your next adventure.
                    </div>
                </div>
            </div>
            
            <!-- Flow Selection -->
            <div class="alfie-flow-selection" id="flow-selection">
                <button class="alfie-flow-button" data-flow="inspire">
                    💡 Inspire me — I'm not sure where to go yet
                    <span class="alfie-flow-arrow">→</span>
                </button>
                <button class="alfie-flow-button" data-flow="planning">
                    🗺️ I know my destination — help with recs & itinerary
                    <span class="alfie-flow-arrow">→</span>
                </button>
            </div>
            
            <!-- Questions Section -->
            <div id="questions-section" class="alfie-questions-section alfie-hidden">
                <div class="alfie-question-display">
                    <div class="alfie-avatar">
                        <img src="./widget/images/3.png" alt="Alfie" />
                    </div>
                    <div id="current-question" class="alfie-question-text">
                        <!-- Dynamic question text -->
                    </div>
                </div>
                
                <div id="answer-options" class="alfie-answer-options">
                    <!-- Dynamic answer options -->
                </div>
                
                <div class="alfie-custom-input" id="custom-input" style="display: none;">
                    <input type="text" id="custom-answer-field" class="alfie-input" placeholder="Type your answer here..." />
                    <button class="alfie-submit-button" id="submit-custom">Submit</button>
                </div>
                
                <!-- Alfie intermediate messages -->
                <div id="alfie-message" class="alfie-message">
                    <div class="alfie-avatar">
                        <img src="./widget/images/3.png" alt="Alfie" />
                    </div>
                    <div id="alfie-comment" class="alfie-comment">
                        <!-- Dynamic Alfie comments -->
                    </div>
                </div>
            </div>
            
            <!-- Loading State -->
            <div id="loading-section" class="alfie-loading-section alfie-hidden">
                Perfect! I'm analyzing your preferences and preparing personalized recommendations
            </div>
            
            <!-- Final Results -->
            <div id="results-section" class="alfie-final-results alfie-hidden">
                <!-- Dynamic results -->
            </div>
        </div>
    </div>

    <script src="./widget/app.js"></script>
</body>
</html>
